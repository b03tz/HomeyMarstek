<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      color: #fff;
    }
    p {
      margin-bottom: 16px;
      opacity: 0.8;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      opacity: 0.7;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 15px;
      box-sizing: border-box;
    }
    input::placeholder { color: rgba(255,255,255,0.4); }
    input:focus { outline: none; border-color: rgba(255,255,255,0.5); }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
    }
    .status.error { color: #ff6b6b; }
    .status.success { color: #51cf66; }
  </style>
</head>
<body>
  <p>Enter the IP address of your Marstek device to add it manually, or skip to auto-discover devices on your network.</p>

  <div class="form-group">
    <label>IP Address</label>
    <input type="text" id="address" placeholder="192.168.1.253">
  </div>

  <div class="form-group">
    <label>UDP Port</label>
    <input type="number" id="port" value="30000" placeholder="30000">
  </div>

  <div class="status" id="status"></div>

  <div class="buttons">
    <button class="btn-secondary" id="skipBtn">Auto-discover</button>
    <button class="btn-primary" id="addBtn">Add device</button>
  </div>

  <script>
    const statusEl = document.getElementById('status');

    document.getElementById('skipBtn').addEventListener('click', () => {
      Homey.emit('manual_skip');
      Homey.nextView();
    });

    document.getElementById('addBtn').addEventListener('click', async () => {
      const address = document.getElementById('address').value.trim();
      const port = parseInt(document.getElementById('port').value) || 30000;

      if (!address) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Please enter an IP address';
        return;
      }

      statusEl.className = 'status';
      statusEl.textContent = 'Connecting...';

      try {
        const result = await Homey.emit('manual_add', { address, port });
        if (result && result.success) {
          statusEl.className = 'status success';
          statusEl.textContent = 'Found ' + result.name + '! Proceeding...';
          setTimeout(() => Homey.nextView(), 1000);
        } else {
          statusEl.className = 'status error';
          statusEl.textContent = result.error || 'Device not found at this address';
        }
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = err.message || 'Failed to connect';
      }
    });
  </script>
</body>
</html>
